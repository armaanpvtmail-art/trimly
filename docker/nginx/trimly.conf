# Nginx config for Trimly reverse proxy (handles TLS termination if certs are present)

server {
  listen 80;
  listen [::]:80;
  server_name your-domain.com;

  # Redirect HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name your-domain.com;

  ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Gzip
  gzip on;
  gzip_types text/plain application/javascript application/json text/css image/svg+xml;

  # Serve static public files directly
  location ~ ^/(icons|manifest.webmanifest|offline.html|assets|themes)/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  # Proxy everything else to the app
  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;
  }

  # Healthcheck endpoint
  location /health {
    proxy_pass http://app:3000/health;
  }
}
